<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TruePrice</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { width: 350px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h2 { margin: 0 0 10px 0; color: #333; font-size: 18px; }
        .loading { color: #666; font-style: italic; }
        .error { color: #d32f2f; display: none; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; background: #f5f5f5; padding: 10px; border-radius: 5px; }
        .stat-box { text-align: center; }
        .stat-value { font-weight: bold; font-size: 16px; color: #1976d2; }
        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>📈 TruePrice Tracker</h2>
    
    <div id="loading" class="loading">Loading price history...</div>
    <div id="error" class="error">No price history available or not an Amazon product page.</div>

    <div id="content" style="display: none;">
        <div class="stats">
            <div class="stat-box">Lowest<br><span id="minPrice" class="stat-value">-</span></div>
            <div class="stat-box">Average<br><span id="avgPrice" class="stat-value">-</span></div>
            <div class="stat-box">Highest<br><span id="maxPrice" class="stat-value">-</span></div>
        </div>
        <canvas id="priceChart"></canvas>
    </div>

    <script src="popup.js"></script>
</body>
</html>
